[project]
name = "medtriage-env"
version = "0.1.0"
description = "AI Medical Triage OpenEnv Project"
authors = [
    { name = "Avimanyu" }
]
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "gradio",
    "openai"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"